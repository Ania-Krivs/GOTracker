<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Страничка пользователя</title>
    <link rel="stylesheet" href="user.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <button id="back-btn" type="button">Назад</button>
        
        <div id="auth-section">
            <h1 id="title">Вход</h1>
            <input type="text" id="code-input" placeholder="Код команды" autocomplete="off">
            <div id="error-block" class="error-msg hidden"></div>
            <button id="login-btn" type="button">Продолжить</button>
        </div>

        <div id="workspace-section" class="hidden">
            <h1 id="title">Dashboard</h1>
            <div class="status-container">
                Статус: <span id="status-indicator" class="disconnected">Отключено</span>
            </div>
            
            <div id="chat-box" class="chat-placeholder">
                Ожидание сообщений от администратора...
            </div>

            <div id="reply-container" class="hidden">
                <textarea id="reply-input" placeholder="Введите ответ администратору (до 150 символов)..." maxlength="150"></textarea>
                <div id="char-counter">0 / 150</div>
                <button id="send-reply-btn" type="button">Отправить ответ</button>
            </div>
        </div>
    </div>
    <script src="user.js"></script>
</body>
</html>
