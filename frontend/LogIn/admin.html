<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="styleAdmin.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <title>Admin's Portal</title>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <button id="back-btn" type="button">
            Go Back
            </button>
            <div class="toggle-container">
                <div class="slider"></div>
                <div class="toggle-btn active" id="tab-login">Вход</div>
                <div class="toggle-btn" id="tab-register">Регистрация</div>
            </div>

            <h1 id="title_A">Admin LogIn</h1>

            <div class="form-fields">
                <input type="text" id="field-name" placeholder="Name" class="hidden">
                <input type="text" id="field-email" placeholder="Enter email">
                <div class="password-wrapper">
                <input type="password" id="field-password" placeholder="Password">
                <span id="togglePassword" class="material-icons">visibility</span>
                </div>
                <div id="error-message" class="error-text hidden"></div>
                <button id="submit-btn">Continue</button>
            </div>
        </div>

        <script src="admin.js"></script>
    </body>
</html>
